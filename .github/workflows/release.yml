name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Uses a standard stable version matching the codebase
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Compile Inno Setup Installer
        run: |
          iscc windows\installer.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: windows/setup_output/SchoolEVM_Setup.exe

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release_files

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: release_files

      - name: Rename Files for Release
        run: |
          mv release_files/app-release.apk release_files/SchoolEVM_Android.apk
          mv release_files/SchoolEVM_Setup.exe release_files/SchoolEVM_Windows_Setup.exe

      - name: Create Release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_files/SchoolEVM_Android.apk
            release_files/SchoolEVM_Windows_Setup.exe
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            ## School EVM Pro Release
            
            Download the files below to get started:
            * **Windows Laptop/PC (Booth or Controller Desk)**: Download `SchoolEVM_Windows_Setup.exe` and run the installer.
            * **Android Mobile/Tablet (Controller)**: Download `SchoolEVM_Android.apk` and install it.
            
            *Note: This release was built automatically by GitHub Actions.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
